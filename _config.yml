# ==========================================================
# Digital Agriculture Applications — Chirpy configuration
# Replace the current Jekyll config with this file.
# ==========================================================

theme: jekyll-theme-chirpy

lang: en
timezone: America/Sao_Paulo

title: Digital Agriculture Applications
tagline: Remote Sensing • AI • Precision Agriculture
description: >-
  Research portfolio focused on digital agriculture, computer vision,
  geospatial analytics, and practical AI solutions for precision farming.

# IMPORTANT:
# If you later rename the repository, update `baseurl`.
url: "https://thiagoagro.github.io"
baseurl: "/Digital-Agriculture-Applications"

# Sidebar / identity
avatar:

# Keep the site always in dark mode
theme_mode: dark

# SEO / author / footer
social:
  name: Thiago O. C. Barboza
  email: thiagocostaagro@gmail.com
  links:
    - https://github.com/thiagoagro

github:
  username: thiagoagro

# Optional site preview image for sharing links
social_preview_image:

# Table of contents
toc: true

# Comments disabled for now
comments:
  provider:

# CDN not used
cdn:

# Analytics disabled for now
analytics:
  google:
    id:
  goatcounter:
    id:
  umami:
    id:
    domain:
  matomo:
    id:
    domain:
  cloudflare:
    id:
  fathom:
    id:

# Optional verification tokens
webmaster_verifications:
  google:
  bing:
  alexa:
  yandex:
  baidu:
  facebook:

# PWA
pwa:
  enabled: true
  cache:
    enabled: true
    deny_paths:

paginate: 10

kramdown:
  footnote_backlink: "↩︎"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  -
    scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: false
      toc: true
      permalink: /posts/:title/
  -
    scope:
      path: _drafts
    values:
      comments: false
  -
    scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
